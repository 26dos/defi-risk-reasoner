name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest
      - run: pytest -q
        env:
          ANTHROPIC_API_KEY: dummy
          ETH_RPC_URL: http://localhost:8545
